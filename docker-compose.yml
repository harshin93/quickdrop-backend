version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: quickdrop-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quickdrop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  auth_service:
    build:
      context: .
      dockerfile: services/auth_service/Dockerfile
    container_name: quickdrop-auth
    depends_on:
      - postgres
    env_file:
      - .env.example
    ports:
      - "5001:5000"
    volumes:
      - ./services/auth_service/app:/app/app
      - ./shared:/app/shared
    restart: unless-stopped

volumes:
  postgres_data: